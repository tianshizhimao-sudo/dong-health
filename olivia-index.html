<head>

  <title>💕 Olivia 健康中心</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
      --card: #ffffff;
      --primary: #e17055;
      --primary-light: #fab1a0;
      --secondary: #fd79a8;
      --success: #00b894;
      --text: #2d3436;
      --muted: #636e72;
      --border: #f0e6e0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans SC', -apple-system, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      padding: 20px;
      padding-bottom: 40px;
    }

    .container {
      max-width: 400px;
      margin: 0 auto;
      text-align: center;
    }

    .avatar {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #fd79a8, #e17055);
      border-radius: 50%;
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      box-shadow: 0 8px 24px rgba(225, 112, 85, 0.3);
    }

    h1 {
      font-size: 26px;
      color: var(--primary);
      margin-bottom: 4px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 8px;
    }

    .status-badge {
      display: inline-block;
      padding: 6px 16px;
      background: linear-gradient(135deg, #d4fc79, #96e6a1);
      border-radius: 20px;
      font-size: 12px;
      color: #2d3436;
      margin-bottom: 30px;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 20px;
      background: var(--card);
      border-radius: 20px;
      text-decoration: none;
      color: var(--text);
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      transition: all 0.3s;
    }
    .menu-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    }
    .menu-item:active {
      transform: scale(0.98);
    }

    .menu-icon {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
    }
    .menu-icon.pink { background: linear-gradient(135deg, #fd79a8, #e17055); }
    .menu-icon.purple { background: linear-gradient(135deg, #a29bfe, #6c5ce7); }
    .menu-icon.green { background: linear-gradient(135deg, #55efc4, #00b894); }
    .menu-icon.blue { background: linear-gradient(135deg, #74b9ff, #0984e3); }
    .menu-icon.orange { background: linear-gradient(135deg, #ffeaa7, #fdcb6e); }

    .menu-content {
      text-align: left;
      flex: 1;
    }

    .menu-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .menu-desc {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
    }

    .footer {
      margin-top: 30px;
      font-size: 12px;
      color: var(--muted);
    }

    .heart-float {
      position: fixed;
      font-size: 20px;
      animation: float 3s ease-in-out infinite;
      opacity: 0.6;
    }
    .heart-float:nth-child(1) { top: 10%; left: 10%; animation-delay: 0s; }
    .heart-float:nth-child(2) { top: 20%; right: 15%; animation-delay: 1s; }
    .heart-float:nth-child(3) { bottom: 30%; left: 8%; animation-delay: 2s; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* Home UI sync */
    :root{--bg:#07080c;--card:rgba(13,15,21,.74);--primary:#34e0a1;--primary-light:#5ff0bb;--secondary:#a67bff;--success:#34e0a1;--text:#f2f3f5;--muted:#9aa0ae;--border:rgba(255,255,255,.08);}
    body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Segoe UI",system-ui,sans-serif;background:radial-gradient(120% 90% at 0 0,rgba(52,224,161,.12),transparent 55%),radial-gradient(120% 90% at 100% 100%,rgba(166,123,255,.14),transparent 55%),#07080c;}
    .avatar{background:linear-gradient(135deg,#34e0a1,#a67bff);box-shadow:0 8px 28px rgba(52,224,161,.28);}
    .status-badge{background:rgba(52,224,161,.14);color:#34e0a1;border:1px solid rgba(52,224,161,.25);}
    .menu-item{background:rgba(13,15,21,.72);border:1px solid var(--border);box-shadow:0 1px 0 rgba(255,255,255,.04) inset,0 24px 40px -30px rgba(0,0,0,.8);}

  </style>
</head>
