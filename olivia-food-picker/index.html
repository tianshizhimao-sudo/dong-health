<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#fef3c7">
  <title>Olivia 今天吃什么？</title>
  <style>
    :root {
      --bg: #fffbeb;
      --card: #ffffff;
      --primary: #f59e0b;
      --primary-light: #fef3c7;
      --success: #10b981;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
      padding-bottom: 100px;
    }
    .container { max-width: 500px; margin: 0 auto; }
    header { text-align: center; padding: 20px 0; }

    .logo {
      width: 120px;
      height: auto;
      margin-bottom: 16px;
    }

    h1 { font-size: 24px; color: var(--primary); margin-bottom: 8px; }
    .subtitle { color: var(--muted); font-size: 14px; }

    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .meal-selector {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .meal-btn {
      flex: 1;
      padding: 12px;
      border: 2px solid var(--border);
      border-radius: 12px;
      background: white;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .meal-btn.active {
      border-color: var(--primary);
      background: var(--primary-light);
    }
    .meal-btn .emoji { font-size: 20px; display: block; margin-bottom: 4px; }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .category-btn {
      padding: 16px 8px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: white;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 12px;
    }
    .category-btn:hover { border-color: var(--primary); }
    .category-btn.active {
      border-color: var(--primary);
      background: var(--primary-light);
    }
    .category-btn .emoji { font-size: 24px; display: block; margin-bottom: 4px; }

    .btn-generate {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn-generate:active { transform: scale(0.98); }

    .result-card {
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border: 2px solid var(--primary);
    }
    .result-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--primary);
    }
    .result-item {
      background: white;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .result-emoji { font-size: 32px; }
    .result-text h3 { font-size: 16px; margin-bottom: 4px; }
    .result-text p { font-size: 12px; color: var(--muted); }

    .tag {
      display: inline-block;
      padding: 4px 8px;
      background: var(--primary-light);
      border-radius: 20px;
      font-size: 10px;
      color: var(--primary);
      margin-right: 4px;
    }

    .btn-refresh {
      width: 100%;
      padding: 12px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 14px;
      cursor: pointer;
      margin-top: 8px;
    }

    .tips {
      background: #ecfdf5;
      border: 1px solid #10b981;
      border-radius: 12px;
      padding: 12px;
      font-size: 13px;
      color: #065f46;
    }
    .tips strong { color: #047857; }

    .hidden { display: none; }

    .avoid-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }
    .avoid-tag {
      padding: 4px 10px;
      background: #fee2e2;
      border-radius: 20px;
      font-size: 11px;
      color: #dc2626;
    }

    .footer {
      text-align: center;
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .footer-logo {
      width: 80px;
      height: auto;
      opacity: 0.6;
    }
    .footer-text {
      font-size: 11px;
      color: var(--muted);
      margin-top: 8px;
    }

    /* Home UI sync */
    :root{--bg:#07080c;--card:rgba(13,15,21,.74);--primary:#fcd34d;--primary-light:rgba(252,211,77,.14);--text:#f2f3f5;--muted:#9aa0ae;--border:rgba(255,255,255,.08);}
    body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Segoe UI",system-ui,sans-serif;background:radial-gradient(120% 90% at 0 0,rgba(52,224,161,.12),transparent 55%),radial-gradient(120% 90% at 100% 100%,rgba(166,123,255,.14),transparent 55%),var(--bg);}
    .card,.meal-btn,.category-btn{background:rgba(13,15,21,.72);border-color:var(--border);}
    .card{box-shadow:0 1px 0 rgba(255,255,255,.04) inset,0 24px 40px -30px rgba(0,0,0,.8);}
    .meal-btn.active,.category-btn.active{background:var(--primary-light);border-color:var(--primary);}
    .btn-generate{background:linear-gradient(135deg,#fcd34d,#f59e0b);color:#3a1d00;}

  </style>
</head>
<body>
  <div class="container">
    <header>
      <!-- Oney & Co Logo -->
      <svg class="logo" viewBox="0 0 190 90" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#D4A853"/>
            <stop offset="100%" style="stop-color:#B8860B"/>
          </linearGradient>
        </defs>
        <g transform="translate(38, 45)">
          <path d="M 0 -32 A 32 32 0 1 0 0 -31.99" fill="none" stroke="url(#goldGrad)" stroke-width="7" stroke-linecap="round" stroke-dasharray="191 10"/>
          <path d="M0 -38 L0 -44" stroke="url(#goldGrad)" stroke-width="5" stroke-linecap="round"/>
        </g>
        <text x="32" y="50" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="600" fill="#1E293B">ney</text>
        <text x="77" y="50" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="url(#goldGrad)">&amp;</text>
        <text x="94" y="50" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="600" fill="#1E293B">co</text>
      </svg>
      <h1>🌸 Olivia 今天吃什么？</h1>
      <p class="subtitle">亚甲炎康复期饮食灵感</p>
    </header>

    <div class="card">
      <div class="card-title">🕐 选择餐次</div>
      <div class="meal-selector">
        <button class="meal-btn active" onclick="selectMeal('breakfast')">
          <span class="emoji">🌅</span>早餐
        </button>
        <button class="meal-btn" onclick="selectMeal('lunch')">
          <span class="emoji">☀️</span>午餐
        </button>
        <button class="meal-btn" onclick="selectMeal('dinner')">
          <span class="emoji">🌙</span>晚餐
        </button>
        <button class="meal-btn" onclick="selectMeal('snack')">
          <span class="emoji">🍵</span>小食
        </button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">💭 今天想吃什么类型？</div>
      <div class="category-grid">
        <button class="category-btn" onclick="selectCategory('light')">
          <span class="emoji">🥗</span>清淡
        </button>
        <button class="category-btn" onclick="selectCategory('warm')">
          <span class="emoji">🍲</span>温热
        </button>
        <button class="category-btn" onclick="selectCategory('protein')">
          <span class="emoji">🍗</span>蛋白质
        </button>
        <button class="category-btn" onclick="selectCategory('grain')">
          <span class="emoji">🍚</span>主食
        </button>
        <button class="category-btn" onclick="selectCategory('veggie')">
          <span class="emoji">🥬</span>蔬菜
        </button>
        <button class="category-btn" onclick="selectCategory('any')">
          <span class="emoji">🎲</span>随便
        </button>
      </div>

      <button class="btn-generate" onclick="generateIdeas()">✨ 给我灵感</button>
    </div>

    <div class="card result-card hidden" id="resultCard">
      <div class="result-title">💡 今天可以试试...</div>
      <div id="resultList"></div>
      <button class="btn-refresh" onclick="generateIdeas()">🔄 换一批</button>
    </div>

    <div class="card tips">
      <strong>💡 温馨提示</strong><br>
      少食多餐 · 温热为主 · 多喝温水 · 保持好心情 ❤️
    </div>

    <div class="card">
      <div class="card-title">❌ 康复期避免</div>
      <div class="avoid-list">
        <span class="avoid-tag">海带/紫菜</span>
        <span class="avoid-tag">咖啡</span>
        <span class="avoid-tag">浓茶</span>
        <span class="avoid-tag">辛辣</span>
        <span class="avoid-tag">加工食品</span>
        <span class="avoid-tag">酒精</span>
        <span class="avoid-tag">冰冷食物</span>
      </div>
    </div>

    <div class="footer">
      <svg class="footer-logo" viewBox="0 0 190 90" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="goldGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#D4A853"/>
            <stop offset="100%" style="stop-color:#B8860B"/>
          </linearGradient>
        </defs>
        <g transform="translate(38, 45)">
          <path d="M 0 -32 A 32 32 0 1 0 0 -31.99" fill="none" stroke="url(#goldGrad2)" stroke-width="7" stroke-linecap="round" stroke-dasharray="191 10"/>
          <path d="M0 -38 L0 -44" stroke="url(#goldGrad2)" stroke-width="5" stroke-linecap="round"/>
        </g>
        <text x="32" y="50" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="600" fill="#94a3b8">ney</text>
        <text x="77" y="50" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="url(#goldGrad2)">&amp;</text>
        <text x="94" y="50" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="600" fill="#94a3b8">co</text>
      </svg>
      <p class="footer-text">Made with ❤️ for Olivia</p>
    </div>
  </div>

        ],

        ]
      }
    };

    function selectMeal(meal) {
      selectedMeal = meal;
      document.querySelectorAll('.meal-btn').forEach(b => b.classList.remove('active'));
      event.currentTarget.classList.add('active');
    }

    function selectCategory(cat) {
      selectedCategory = cat;
      document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
      event.currentTarget.classList.add('active');
    }

    function generateIdeas() {
      const card = document.getElementById('resultCard');
      const list = document.getElementById('resultList');

      let pool = [];
      const mealFoods = foods[selectedMeal];

      if (selectedCategory && selectedCategory !== 'any') {
        pool = mealFoods[selectedCategory] || [];
      } else {
        Object.values(mealFoods).forEach(arr => pool.push(...arr));
      }

      const shuffled = pool.sort(() => Math.random() - 0.5);
      const picks = shuffled.slice(0, 3);

      list.innerHTML = picks.map(item => `
        <div class="result-item">
          <span class="result-emoji">${item.emoji}</span>
          <div class="result-text">
            <h3>${item.name}</h3>
            <p>${item.tags.map(t => `<span class="tag">${t}</span>`).join('')}</p>
          </div>
        </div>
      `).join('');

      card.classList.remove('hidden');
      card.scrollIntoView({ behavior: 'smooth' });
    }
  </script>
</body>
</html>
